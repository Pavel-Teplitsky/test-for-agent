name: QA -> Translate

on:
  workflow_dispatch:
    inputs:
      translate:
        description: 'Force translation run'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  translate:
    runs-on: ${{ github.repository == 'something' && 'self-hosted' || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Detect changed English JSON files
        id: check_changes
        shell: bash
        run: |
          # ----------------------------------------
          # Manual override (workflow_dispatch flag)
          # ----------------------------------------
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.translate }}" = "true" ]; then
            echo "Manual translate flag enabled — forcing run"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "paths=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              # New branch
              base_ref="origin/main"
              if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
                base_ref="origin/master"
              fi
              changed_files=$(git diff --name-only "$base_ref" HEAD || true)
            else
              changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
            fi
          else
            # workflow_dispatch fallback
            changed_files=$(git diff --name-only HEAD~1 HEAD || true)
          fi

          echo "Changed files:"
          echo "$changed_files"

          en_files=$(echo "$changed_files" | grep -E '(^|/)en\.json$|\.en\.json$' || true)

          if [ -z "$en_files" ]; then
            echo "No English JSON files changed"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "English JSON files changed:"
          echo "$en_files"

          paths=$(echo "$en_files" | xargs -I {} dirname {} | sort -u)

          echo "Unique paths:"
          echo "$paths"

          json_paths="["
          first=true
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ "$first" = true ]; then
              first=false
            else
              json_paths+=","
            fi
            json_paths+="$path"
          done <<< "$paths"
          json_paths+="]"

          echo "JSON paths: $json_paths"

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "paths=$json_paths" >> "$GITHUB_OUTPUT"

      - name: Exit early if no English JSON changes
        if: steps.check_changes.outputs.run != 'true'
        run: |
          echo "No English JSON files changed — nothing to do."
          exit 0

      - name: Run translation script
        if: steps.check_changes.outputs.run == 'true'
        id: run_translate
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          ORIGINAL_PATHS: ${{ steps.check_changes.outputs.paths }}
        run: |
          echo "Using branch: $BRANCH_NAME"
          echo "Original paths raw: $ORIGINAL_PATHS"

          # Convert ORIGINAL_PATHS into valid JSON array with quotes
          # Remove surrounding brackets first
          paths=$(echo "$ORIGINAL_PATHS" | sed 's/^\[\(.*\)\]$/\1/')

          # Split by comma and wrap each in quotes
          IFS=',' read -r -a arr <<< "$paths"
          ORIGINAL_PATHS_JSON="["
          first=true
          for p in "${arr[@]}"; do
            p=$(echo "$p" | xargs)   # trim whitespace
            [ -z "$p" ] && continue
            if [ "$first" = true ]; then
              first=false
            else
              ORIGINAL_PATHS_JSON+=","
            fi
            ORIGINAL_PATHS_JSON+="\"$p\""
          done
          ORIGINAL_PATHS_JSON+="]"

          echo "Original paths JSON: $ORIGINAL_PATHS_JSON"

          # Locales as proper JSON array
          LOCALES_JSON='["hr","sk","ka","bg","ar","cs","de","el","es","fr","hi","id","it","ja","ko","pt","ro","sv","vi","th","tr","uk","zh-cn","zh-tw","he","pl","nl","az","hu","ru"]'

          # Build payload manually
          payload="{\"git\":\"git@github.com:Pavel-Teplitsky/test-for-agent.git\", \"branch\":\"$BRANCH_NAME\", \"originalPaths\":$ORIGINAL_PATHS_JSON, \"locales\":$LOCALES_JSON}"

          echo "Payload:"
          echo "$payload"

          # Call translation service
          response=$(curl -s -X POST https://translation.agents.conholdate.dynabic.com/translate \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Token: ${{ secrets.TRANSLATION_AGENT_TOKEN }}" \
            -d "$payload")

          echo "Translation service response:"
          echo "$response"

          # Extract jobId using pure Bash
          jobId=$(echo "$response" | grep -o '"jobId":"[^"]*"' | sed 's/"jobId":"\([^"]*\)"/\1/')
          echo "Translation job ID: $jobId"

          # Optional polling (wait for translation to finish)
          while true; do
            status=$(curl -s https://translation.agents.conholdate.dynabic.com/status/$jobId | grep -o '"status":"[^"]*"' | sed 's/"status":"\([^"]*\)"/\1/')
            echo "Job status: $status"
            if [ "$status" = "completed" ]; then
              echo "Translation completed successfully."
              break
            fi
            if [ "$status" = "failed" ]; then
              echo "Translation failed!"
              exit 1
            fi
            sleep 10
          done
